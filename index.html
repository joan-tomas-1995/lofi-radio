<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lofi Radio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px; height: 200px;
      font-family: Inter, system-ui, Avenir, Helvetica, Arial, sans-serif;
      background: #1a1a2e; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    img { width: 64px; height: 64px; border-radius: 16px; }
    h1 { font-size: 18px; font-weight: 600; }
    p { font-size: 12px; opacity: 0.7; text-align: center; padding: 0 20px; }
    a {
      display: inline-block; padding: 10px 24px;
      background: #646cff; color: #fff;
      text-decoration: none; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      transition: background 0.2s;
    }
    a:hover { background: #535bf2; }
  </style>
</head>
<body>
  <img src="icon-lofi.webp" alt="Lofi Radio">
  <h1>Lofi Music Radio</h1>
  <p>Free, ad-free lofi music 24/7</p>
  <a href="https://lofimusicradio.com" target="_blank" rel="noopener">Open Radio →</a>
</body>
</html>
